services:
  # ==================== 基础设施 ====================

  actus-redis:
    image: redis:7-alpine
    container_name: actus-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - actus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  actus-postgres:
    image: pgvector/pgvector:pg16
    container_name: actus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-actus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - actus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-actus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务 ====================

  actus-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: actus-sandbox
    container_name: actus-sandbox
    restart: "no"
    networks:
      - actus-network

  # ==================== 后端 API ====================

  actus-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actus-backend
    restart: unless-stopped
    env_file:
      - .env
    # 如需动态创建沙箱容器，取消以下注释以挂载 Docker Socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      actus-redis:
        condition: service_healthy
      actus-postgres:
        condition: service_healthy
    networks:
      - actus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:23140/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== 前端 UI ====================

  actus-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: actus-frontend
    restart: unless-stopped
    depends_on:
      actus-backend:
        condition: service_healthy
    networks:
      - actus-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  actus-nginx:
    image: nginx:alpine
    container_name: actus-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8088}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 需要提供 fullchain.pem 与 privkey.pem
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      actus-frontend:
        condition: service_healthy
      actus-backend:
        condition: service_healthy
    networks:
      - actus-network

# ==================== 数据卷 ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ==================== 网络 ====================
networks:
  actus-network:
    name: actus-network
    driver: bridge
