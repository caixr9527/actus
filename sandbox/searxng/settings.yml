use_default_settings: true

general:
  debug: false
  instance_name: "Actus Sandbox SearXNG"


engines:
  - name: baidu
    engine: baidu
    shortcut: bd
    timeout: 4.0
    disabled: false
  - name: sogou
    engine: sogou
    shortcut: sg
    timeout: 4.0
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    timeout: 4.0
    disabled: false

search:
  formats:
    - html
    - json

server:
  # 运行时优先由环境变量 SEARXNG_SECRET 覆盖。
  secret_key: "managed-by-env"
  limiter: false
  image_proxy: false
  public_instance: false
  bind_address: "127.0.0.1"
  port: 8082

valkey:
  url: false
